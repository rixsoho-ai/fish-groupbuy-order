<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>魚鱻如意好物網｜線上下單</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{--ink:#153d38;--muted:#667a76;--primary:#087b6d;--mint:#e7f6f2;--line:#dce7e4;--page:#f5f8f7;--accent:#fff7cf;--danger:#a53a3a;--shadow:0 14px 38px rgba(21,61,56,.09)}
    *{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;background:var(--page);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;line-height:1.5}button,input,select{font:inherit}
    .app{width:min(680px,calc(100% - 20px));margin:auto;padding:max(12px,env(safe-area-inset-top)) 0 calc(88px + env(safe-area-inset-bottom))}
    .hero{padding:22px;border-radius:21px;background:linear-gradient(135deg,#0d7569,#154e49);color:#fff;box-shadow:var(--shadow)}.hero h1{margin:0;font-size:27px}.hero p{margin:6px 0 0;color:#d8ebe8}.profile{display:flex;align-items:center;gap:11px;margin-top:15px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2)}.avatar{width:44px;height:44px;border:2px solid #b8dcd6;border-radius:50%;object-fit:cover}.profile small{display:block;color:#c7dedb}
    .card{margin-top:14px;overflow:hidden;border:1px solid var(--line);border-radius:17px;background:#fff;box-shadow:var(--shadow)}.head{padding:17px 19px;background:var(--mint)}.head h2{margin:0;font-size:20px}.head p{margin:3px 0 0;color:var(--muted);font-size:14px}.body{padding:18px}.field{margin-bottom:14px}.field label{display:block;margin-bottom:7px;font-size:14px;font-weight:800}
    .control{width:100%;min-height:52px;padding:11px 13px;border:1px solid #c8d8d4;border-radius:11px;background:var(--accent);color:var(--ink);outline:0}.control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(8,123,109,.13)}
    .picker{position:relative}.results{position:absolute;z-index:15;right:0;left:0;max-height:270px;overflow:auto;padding:5px;border:1px solid var(--line);border-radius:11px;background:#fff;box-shadow:var(--shadow)}.option{display:block;width:100%;padding:11px;border:0;border-radius:8px;background:#fff;text-align:left}.option:hover{background:var(--mint)}.option small{display:block;color:var(--muted)}
    .qty{display:grid;grid-template-columns:1fr 110px;gap:11px}.price{display:flex;justify-content:space-between;gap:12px;padding:14px 15px;border-radius:11px;background:#f6faf9}.price span{color:var(--muted);font-size:13px}.price strong{display:block;font-size:21px}
    .button{width:100%;min-height:52px;border:0;border-radius:11px;background:var(--primary);color:#fff;font-weight:900}.button.secondary{border:1px solid var(--primary);background:#fff;color:var(--primary)}.button:disabled{opacity:.55}.sticky{position:fixed;right:0;bottom:0;left:0;z-index:10;padding:10px max(10px,calc((100% - 660px)/2)) calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(255,255,255,.96);backdrop-filter:blur(10px)}
    .summary{padding:14px 15px;border-radius:11px;background:var(--mint)}.summary span{color:var(--muted);font-size:13px}.summary strong{display:block;font-size:24px}.orders{display:grid;gap:9px;margin-top:12px}.order{padding:13px 14px;border:1px solid var(--line);border-radius:11px}.order-top{display:flex;justify-content:space-between;gap:10px}.order h3{margin:0;font-size:16px}.meta{margin-top:5px;color:var(--muted);font-size:14px}.success{margin-bottom:14px;padding:15px;border:1px solid #a8d8ca;border-radius:12px;background:#effaf6}.success h3{margin:0 0 8px}.success p{margin:4px 0}.notice{padding:12px 13px;border-radius:10px;background:#fff5d7;color:#6a5410;font-size:14px}
    dialog{width:min(520px,calc(100% - 22px));padding:0;border:0;border-radius:16px;color:var(--ink);box-shadow:0 24px 70px rgba(0,0,0,.25)}dialog::backdrop{background:rgba(13,35,32,.52)}.dialog-head{padding:17px 19px;background:var(--mint)}.dialog-head h3{margin:0}.dialog-body{padding:19px}.detail{padding:14px;border-radius:11px;background:#f5f8f7}.detail p{display:flex;justify-content:space-between;gap:10px;margin:7px 0}.dialog-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
    .loading{padding:70px 20px;text-align:center;color:var(--muted)}.spinner{width:34px;height:34px;margin:0 auto 10px;border:3px solid #cde4df;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}.empty{padding:22px 8px;text-align:center;color:var(--muted)}.toast{position:fixed;right:12px;bottom:82px;left:12px;z-index:30;max-width:650px;margin:auto;padding:13px 15px;border-radius:10px;background:#173c37;color:#fff;opacity:0;transform:translateY(9px);pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:none}.toast.error{background:var(--danger)}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<main class="app">
  <section class="hero"><h1>魚鱻如意好物網</h1><p>選擇商品與數量，即可完成團購下單</p><div class="profile" id="profile" hidden><img class="avatar" id="avatar" alt=""><div><small>LINE 會員</small><strong id="lineName"></strong></div></div></section>
  <div class="loading" id="loading"><div class="spinner"></div><div id="loadingText">正在讀取會員與商品資料...</div></div>
  <section class="card" id="bindCard" hidden><div class="head"><h2>首次登入確認</h2><p>請確認您的會員姓名</p></div><div class="body"><div class="notice">系統會優先使用您的 LINE 暱稱自動建立或綁定會員。</div><div class="field"><label>會員姓名</label><select class="control" id="customerSelect"></select></div><button class="button" id="bindButton">確認綁定</button></div></section>
  <div id="customerArea" hidden>
    <section class="card"><div class="head"><h2>立即下單</h2><p id="memberLabel"></p></div><div class="body"><div class="success" id="successBox" hidden></div><div class="field picker"><label>搜尋商品</label><input class="control" id="productSearch" autocomplete="off" placeholder="輸入商品名稱"><div class="results" id="productResults" hidden></div></div><div class="qty"><div class="field"><label>已選商品</label><input class="control" id="selectedProduct" readonly placeholder="尚未選擇商品"></div><div class="field"><label>數量</label><input class="control" id="quantity" type="number" min="1" step="1" value="1"></div></div><div class="price"><div><span>單價</span><strong id="unitPrice">$0</strong></div><div><span>本筆總額</span><strong id="totalPrice">$0</strong></div></div></div></section>
    <section class="card" id="orders-section"><div class="head"><h2>未出貨商品</h2><p>相同商品會合併顯示</p></div><div class="body"><div class="summary"><span>未出貨累積金額</span><strong id="unshippedAmount">$0</strong></div><div class="orders" id="orders"></div><button class="button secondary" id="refreshButton">重新整理</button></div></section>
  </div>
</main>
<div class="sticky" id="stickySubmit" hidden><button class="button" id="submitButton">確認下單</button></div>
<dialog id="confirmDialog"><div class="dialog-head"><h3>確認訂購內容</h3></div><div class="dialog-body"><div class="detail" id="confirmDetail"></div><div class="dialog-actions"><button class="button secondary" id="backButton">返回修改</button><button class="button" id="confirmButton">送出訂單</button></div></div></dialog>
<div class="toast" id="toast"></div>
<script>
const LIFF_ID='2010372097-N6tgNtDw';
const API_URL='https://script.google.com/macros/s/AKfycbxOfAbLmx0xYwypwQ_oG32azRagr0ysF8RDyEJPtVUrk_PB11DKYrPdDpJ_l3dYGiTf4A/exec';
const money=new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',maximumFractionDigits:0});
const state={auth:null,products:[],customer:null,selected:null};
const el=Object.fromEntries(['loading','loadingText','profile','avatar','lineName','bindCard','customerSelect','bindButton','customerArea','memberLabel','successBox','productSearch','productResults','selectedProduct','quantity','unitPrice','totalPrice','orders','unshippedAmount','refreshButton','stickySubmit','submitButton','confirmDialog','confirmDetail','backButton','confirmButton','toast'].map(id=>[id,document.getElementById(id)]));
async function call(functionName,...args){const response=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({functionName,args}),redirect:'follow'});if(!response.ok)throw new Error(`資料服務連線失敗 (${response.status})`);const payload=await response.json();if(!payload.success)throw new Error(payload.error||'資料處理失敗');return payload.result}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function toast(m,error=false){el.toast.textContent=m;el.toast.classList.toggle('error',error);el.toast.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.toast.classList.remove('show'),3000)}
function busy(button,on,text='處理中...'){if(on){button.dataset.text=button.textContent;button.textContent=text;button.disabled=true}else{button.textContent=button.dataset.text||button.textContent;button.disabled=false}}
function timeout(p,ms,msg){return Promise.race([p,new Promise((_,no)=>setTimeout(()=>no(new Error(msg)),ms))])}
function normalize(v){return String(v||'').normalize('NFKC').replace(/\s+/g,'').toLowerCase()}
function renderPortal(data){state.products=data.products||[];state.customer=data.customer||null;el.lineName.textContent=data.profile?.displayName||'LINE 會員';if(data.profile?.pictureUrl)el.avatar.src=data.profile.pictureUrl;el.profile.hidden=false;if(!state.customer){el.customerSelect.replaceChildren(new Option('請選擇會員',''));(data.customers||[]).forEach(c=>el.customerSelect.append(new Option(c.name,c.name)));el.bindCard.hidden=false;el.customerArea.hidden=true;el.stickySubmit.hidden=true}else{el.bindCard.hidden=true;el.customerArea.hidden=false;el.stickySubmit.hidden=false;el.memberLabel.textContent=`會員：${state.customer.name}`;renderOrders(data.orders)}}
function showProducts(){const key=normalize(el.productSearch.value),items=state.products.filter(p=>!key||normalize(p.name).includes(key)).slice(0,50);el.productResults.replaceChildren(...(items.length?items.map(p=>{const b=document.createElement('button');b.type='button';b.className='option';b.innerHTML=`<strong>${esc(p.name)}</strong><small>${money.format(p.price)}／${esc(p.unit||'件')}${p.endDate?'｜結團 '+esc(p.endDate):''}</small>`;b.onmousedown=e=>{e.preventDefault();selectProduct(p)};return b}):[Object.assign(document.createElement('div'),{className:'empty',textContent:'找不到商品'})]));el.productResults.hidden=false}
function selectProduct(p){state.selected=p;el.selectedProduct.value=p.name;el.productSearch.value=p.name;el.productResults.hidden=true;updatePrice()}
function updatePrice(){const q=Math.max(Number(el.quantity.value)||0,0);el.unitPrice.textContent=money.format(state.selected?.price||0);el.totalPrice.textContent=money.format((state.selected?.price||0)*q)}
function renderOrders(result){const grouped=new Map;(result?.orders||[]).forEach(o=>{const x=grouped.get(o.productName)||{name:o.productName,quantity:0,amount:0,latest:o.date};x.quantity+=Number(o.quantity)||0;x.amount+=Number(o.amount)||0;if(o.date>x.latest)x.latest=o.date;grouped.set(o.productName,x)});el.unshippedAmount.textContent=money.format(result?.unshippedAmount||0);const rows=[...grouped.values()];el.orders.replaceChildren(...(rows.length?rows.map(o=>{const a=document.createElement('article');a.className='order';a.innerHTML=`<div class="order-top"><h3>${esc(o.name)}</h3><strong>${money.format(o.amount)}</strong></div><div class="meta">數量 ${o.quantity}｜最近訂購 ${esc(o.latest)}</div>`;return a}):[Object.assign(document.createElement('div'),{className:'empty',textContent:'目前沒有未出貨商品'})]))}
async function load(){el.loadingText.textContent='正在讀取會員與商品資料...';const data=await timeout(call('getCustomerPortal',state.auth),20000,'讀取逾時，請關閉後從 LINE 再開啟');renderPortal(data);el.loading.hidden=true}
async function init(){try{el.loadingText.textContent='正在連接 LINE 登入...';await timeout(liff.init({liffId:LIFF_ID,withLoginOnExternalBrowser:true}),12000,'LINE 登入連線逾時');if(!liff.isLoggedIn()){liff.login({redirectUri:location.origin+location.pathname+location.hash});return}state.auth={idToken:liff.getIDToken()||'',accessToken:liff.getAccessToken()||''};if(!state.auth.idToken&&!state.auth.accessToken)throw new Error('無法取得 LINE 登入資料');await load()}catch(e){el.loading.innerHTML=`<div class="empty">${esc(e.message)}</div>`;toast(e.message,true)}}
el.productSearch.onfocus=showProducts;el.productSearch.oninput=showProducts;el.productSearch.onblur=()=>setTimeout(()=>el.productResults.hidden=true,120);el.quantity.oninput=updatePrice;
el.submitButton.onclick=()=>{if(!state.selected)return toast('請先選擇商品',true);const q=Number(el.quantity.value);if(!Number.isInteger(q)||q<1)return toast('請輸入正確數量',true);el.confirmDetail.innerHTML=`<p><span>會員</span><strong>${esc(state.customer.name)}</strong></p><p><span>商品</span><strong>${esc(state.selected.name)}</strong></p><p><span>數量</span><strong>${q}</strong></p><p><span>總額</span><strong>${money.format(state.selected.price*q)}</strong></p>`;el.confirmDialog.showModal()};
el.backButton.onclick=()=>el.confirmDialog.close();
el.confirmButton.onclick=async()=>{busy(el.confirmButton,true,'送出中...');busy(el.submitButton,true,'送出中...');try{const q=Number(el.quantity.value),p=state.selected;const result=await call('addLineOrder',state.auth,{productName:p.name,quantity:q});renderOrders(result.orders);el.confirmDialog.close();el.successBox.hidden=false;el.successBox.innerHTML=`<h3>訂單已完成</h3><p>商品：${esc(p.name)}</p><p>數量：${q}</p><p>金額：${money.format(p.price*q)}</p>`;el.quantity.value=1;state.selected=null;el.selectedProduct.value='';el.productSearch.value='';updatePrice();el.successBox.scrollIntoView({behavior:'smooth',block:'center'});toast(result.message)}catch(e){toast(e.message,true)}finally{busy(el.confirmButton,false);busy(el.submitButton,false)}};
el.bindButton.onclick=async()=>{if(!el.customerSelect.value)return toast('請選擇會員',true);busy(el.bindButton,true,'綁定中...');try{renderPortal(await call('bindLineCustomer',state.auth,el.customerSelect.value));toast('會員綁定完成')}catch(e){toast(e.message,true)}finally{busy(el.bindButton,false)}};
el.refreshButton.onclick=async()=>{busy(el.refreshButton,true,'更新中...');try{const data=await call('getCustomerPortal',state.auth);renderOrders(data.orders);toast('訂單已更新')}catch(e){toast(e.message,true)}finally{busy(el.refreshButton,false)}};
init();
</script>
</body>
</html>
