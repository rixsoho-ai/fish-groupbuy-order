<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>魚鱻如意好物網｜線上下單</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{--ink:#153d38;--muted:#667a76;--primary:#087b6d;--mint:#e7f6f2;--line:#dce7e4;--page:#f5f8f7;--accent:#fff7cf;--danger:#a53a3a;--shadow:0 14px 38px rgba(21,61,56,.09)}
    *{box-sizing:border-box}[hidden]{display:none!important}html{-webkit-text-size-adjust:100%;text-size-adjust:100%}body{margin:0;background:var(--page);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;line-height:1.55}button,input,select{font:inherit}button{touch-action:manipulation;cursor:pointer}
    .app{width:min(680px,calc(100% - 20px));margin:auto;padding:max(12px,env(safe-area-inset-top)) 0 calc(24px + env(safe-area-inset-bottom))}
    .hero{padding:clamp(20px,5vw,30px);border-radius:21px;background:linear-gradient(135deg,#0d7569,#154e49);color:#fff;box-shadow:var(--shadow)}.hero h1{margin:0;font-size:clamp(27px,8vw,38px);line-height:1.15;overflow-wrap:anywhere}.hero p{margin:8px 0 0;color:#d8ebe8;font-size:clamp(18px,4.8vw,23px);overflow-wrap:anywhere}.profile{display:flex;align-items:center;gap:12px;margin-top:15px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2);min-width:0}.avatar{width:52px;height:52px;flex:0 0 auto;border:2px solid #b8dcd6;border-radius:50%;object-fit:cover}.profile small{display:block;color:#c7dedb;font-size:clamp(14px,3.8vw,17px)}.profile strong{display:block;font-size:clamp(20px,5vw,26px);line-height:1.25;overflow-wrap:anywhere}.close-page-button{margin-left:auto;min-height:56px;min-width:132px;padding:12px 16px;border:2px solid rgba(255,255,255,.62);border-radius:14px;background:rgba(255,255,255,.14);color:#fff;font-weight:900;font-size:clamp(17px,4.4vw,21px);line-height:1.2;box-shadow:0 8px 22px rgba(0,0,0,.12)}.close-page-button:active{background:rgba(255,255,255,.26);transform:translateY(1px)}
    .card{margin-top:14px;overflow:hidden;border:1px solid var(--line);border-radius:17px;background:#fff;box-shadow:var(--shadow)}.head{padding:clamp(17px,4.8vw,22px);background:var(--mint)}.head h2{margin:0;font-size:clamp(24px,6.4vw,32px);line-height:1.2;overflow-wrap:anywhere}.head p{margin:6px 0 0;color:var(--muted);font-size:clamp(16px,4.2vw,19px);overflow-wrap:anywhere}.body{padding:clamp(17px,4.8vw,22px)}.field{margin-bottom:16px}.field label{display:block;margin-bottom:8px;font-size:clamp(18px,4.9vw,23px);font-weight:900;line-height:1.25}
    .control{width:100%;min-height:60px;padding:14px 15px;border:2px solid #c8d8d4;border-radius:14px;background:var(--accent);color:var(--ink);outline:0;font-size:clamp(18px,4.9vw,23px);line-height:1.35}.control:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(8,123,109,.13)}
    .picker{position:relative}.product-search-hidden{display:none}.results{position:static;z-index:15;display:grid;gap:10px;max-height:none;overflow:visible;margin-top:8px;padding:0;border:0;border-radius:14px;background:transparent;box-shadow:none}.option{display:block;width:100%;min-height:70px;padding:14px;border:2px solid var(--line);border-radius:14px;background:#fff;text-align:left;color:var(--ink)}.option:hover{background:var(--mint)}.option.selected{border:4px solid var(--primary);background:var(--mint);box-shadow:0 0 0 4px rgba(8,123,109,.12)}.option strong{display:block;font-size:clamp(18px,4.8vw,22px);line-height:1.25;overflow-wrap:anywhere}.option small{display:block;margin-top:3px;color:var(--muted);font-size:clamp(15px,4vw,18px);line-height:1.25;overflow-wrap:anywhere}
    .qty{display:grid;grid-template-columns:1fr;gap:12px}.qty-stepper{display:grid;grid-template-columns:minmax(64px,.25fr) minmax(0,1fr) minmax(64px,.25fr);gap:8px;background:transparent}.qty-stepper .control{min-width:0;min-height:64px;border:2px solid #c8d8d4;border-radius:14px;text-align:center;font-size:clamp(22px,6vw,28px);font-weight:900;box-shadow:none}.qty-button{min-height:64px;border:0;border-radius:14px;background:var(--primary);color:#fff;font-size:clamp(30px,8vw,40px);font-weight:900;line-height:1}.qty-button:active{background:#075f52}.price{display:grid;grid-template-columns:1fr;gap:10px;padding:15px;border-radius:14px;background:#f6faf9}.price span{color:var(--muted);font-size:clamp(15px,4vw,18px)}.price strong{display:block;font-size:clamp(27px,7vw,34px);line-height:1.15;overflow-wrap:anywhere}
    .button{width:100%;min-height:62px;border:0;border-radius:14px;background:var(--primary);color:#fff;font-weight:900;font-size:clamp(18px,4.8vw,23px);line-height:1.25;padding:13px 16px}.button.secondary{border:1px solid var(--primary);background:#fff;color:var(--primary)}.button:disabled{opacity:.55}.sticky{position:sticky;right:auto;bottom:0;left:auto;z-index:10;margin:14px calc(50% - 50vw) 0;padding:10px max(10px,calc((100% - 660px)/2)) calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(255,255,255,.96);backdrop-filter:blur(10px)}
    .summary{padding:15px;border-radius:14px;background:var(--mint)}.summary span{color:var(--muted);font-size:clamp(15px,4vw,18px)}.summary strong{display:block;font-size:clamp(28px,7vw,36px);line-height:1.15}.orders{display:grid;gap:10px;margin-top:12px}.order{padding:14px;border:1px solid var(--line);border-radius:14px}.order-top{display:grid;grid-template-columns:1fr;gap:6px}.order h3{margin:0;font-size:clamp(19px,5vw,24px);line-height:1.3;overflow-wrap:anywhere}.meta{margin-top:6px;color:var(--muted);font-size:clamp(16px,4.2vw,19px);overflow-wrap:anywhere}.success{margin-bottom:14px;padding:15px;border:1px solid #a8d8ca;border-radius:14px;background:#effaf6}.success h3{margin:0 0 8px;font-size:clamp(20px,5vw,25px)}.success p{margin:5px 0;font-size:clamp(16px,4.4vw,19px);overflow-wrap:anywhere}.notice{padding:13px;border-radius:12px;background:#fff5d7;color:#6a5410;font-size:clamp(16px,4.2vw,19px);overflow-wrap:anywhere}
    dialog{width:min(520px,calc(100% - 22px));padding:0;border:0;border-radius:16px;color:var(--ink);box-shadow:0 24px 70px rgba(0,0,0,.25)}dialog::backdrop{background:rgba(13,35,32,.52)}.dialog-head{padding:18px;background:var(--mint)}.dialog-head h3{margin:0;font-size:clamp(22px,5.5vw,28px)}.dialog-body{padding:19px}.detail{padding:14px;border-radius:13px;background:#f5f8f7}.detail p{display:grid;grid-template-columns:1fr;gap:4px;margin:9px 0}.detail span{color:var(--muted)}.detail strong{overflow-wrap:anywhere}.dialog-actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:15px}
    .loading{padding:70px 20px;text-align:center;color:var(--muted);font-size:clamp(18px,4.6vw,22px)}.spinner{width:38px;height:38px;margin:0 auto 12px;border:3px solid #cde4df;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}.empty{padding:24px 8px;text-align:center;color:var(--muted);font-size:clamp(17px,4.4vw,20px)}.toast{position:fixed;right:12px;bottom:calc(82px + env(safe-area-inset-bottom));left:12px;z-index:30;max-width:650px;margin:auto;padding:14px 16px;border-radius:12px;background:#173c37;color:#fff;opacity:0;transform:translateY(9px);pointer-events:none;transition:.18s;font-size:clamp(17px,4.4vw,20px);font-weight:800}.toast.show{opacity:1;transform:none}.toast.error{background:var(--danger)}@media(min-width:560px){.qty{grid-template-columns:1fr minmax(230px,.55fr);align-items:end}.price{grid-template-columns:repeat(2,minmax(0,1fr))}.order-top{grid-template-columns:1fr auto}.dialog-actions{grid-template-columns:1fr 1fr}.detail p{grid-template-columns:auto 1fr}.detail strong{text-align:right}}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<main class="app">
  <section class="hero"><h1>魚鱻如意好物網</h1><p>選擇商品與數量，即可完成團購下單</p><div class="profile" id="profile" hidden><img class="avatar" id="avatar" alt=""><div><small>LINE 會員</small><strong id="lineName"></strong></div><button class="close-page-button" id="closePageButton" type="button">關閉頁面</button></div></section>
  <div class="loading" id="loading"><div class="spinner"></div><div id="loadingText">正在讀取會員與商品資料...</div></div>
  <section class="card" id="bindCard" hidden><div class="head"><h2>首次登入確認</h2><p>請確認您的會員姓名</p></div><div class="body"><div class="notice">系統會優先使用您的 LINE 暱稱自動建立或綁定會員。</div><div class="field"><label>會員姓名</label><select class="control" id="customerSelect"></select></div><button class="button" id="bindButton">確認綁定</button></div></section>
  <div id="customerArea" hidden>
    <section class="card"><div class="head"><h2>立即下單</h2><p id="memberLabel"></p></div><div class="body"><div class="success" id="successBox" hidden></div><div class="field picker"><label>選擇商品</label><input class="product-search-hidden" id="productSearch" autocomplete="off" aria-hidden="true" tabindex="-1"><div class="results" id="productResults"></div></div><div class="qty"><div class="field"><label>已選商品</label><input class="control" id="selectedProduct" readonly placeholder="尚未選擇商品"></div><div class="field"><label>數量</label><div class="qty-stepper"><button class="qty-button" id="quantityMinus" type="button" aria-label="減少數量">−</button><input class="control" id="quantity" type="number" min="1" step="1" value="1" inputmode="numeric"><button class="qty-button" id="quantityPlus" type="button" aria-label="增加數量">＋</button></div></div></div><div class="price"><div><span>單價</span><strong id="unitPrice">$0</strong></div><div><span>本筆總額</span><strong id="totalPrice">$0</strong></div></div></div></section>
    <section class="card" id="orders-section"><div class="head"><h2>未出貨商品</h2><p>相同商品會合併顯示</p></div><div class="body"><div class="summary"><span>未出貨累積金額</span><strong id="unshippedAmount">$0</strong></div><div class="orders" id="orders"></div><button class="button secondary" id="refreshButton">重新整理</button></div></section>
  </div>
</main>
<div class="sticky" id="stickySubmit" hidden><button class="button" id="submitButton">確認下單</button></div>
<dialog id="confirmDialog"><div class="dialog-head"><h3>確認訂購內容</h3></div><div class="dialog-body"><div class="detail" id="confirmDetail"></div><div class="dialog-actions"><button class="button secondary" id="backButton">返回修改</button><button class="button" id="confirmButton">送出訂單</button></div></div></dialog>
<div class="toast" id="toast"></div>
<script>
const LIFF_ID='2010372097-N6tgNtDw';
const API_URL='https://script.google.com/macros/s/AKfycbxOfAbLmx0xYwypwQ_oG32azRagr0ysF8RDyEJPtVUrk_PB11DKYrPdDpJ_l3dYGiTf4A/exec';
const money=new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',maximumFractionDigits:0});
const state={auth:null,products:[],customer:null,selected:null};
const el=Object.fromEntries(['loading','loadingText','profile','avatar','lineName','closePageButton','bindCard','customerSelect','bindButton','customerArea','memberLabel','successBox','productSearch','productResults','selectedProduct','quantity','quantityMinus','quantityPlus','unitPrice','totalPrice','orders','unshippedAmount','refreshButton','stickySubmit','submitButton','confirmDialog','confirmDetail','backButton','confirmButton','toast'].map(id=>[id,document.getElementById(id)]));
async function call(functionName,...args){const response=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({functionName,args}),redirect:'follow'});if(!response.ok)throw new Error(`資料服務連線失敗 (${response.status})`);const payload=await response.json();if(!payload.success)throw new Error(payload.error||'資料處理失敗');return payload.result}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function toast(m,error=false){el.toast.textContent=m;el.toast.classList.toggle('error',error);el.toast.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.toast.classList.remove('show'),3000)}
function busy(button,on,text='處理中...'){if(on){button.dataset.text=button.textContent;button.textContent=text;button.disabled=true}else{button.textContent=button.dataset.text||button.textContent;button.disabled=false}}
function timeout(p,ms,msg){return Promise.race([p,new Promise((_,no)=>setTimeout(()=>no(new Error(msg)),ms))])}
function normalize(v){return String(v||'').normalize('NFKC').replace(/\s+/g,'').toLowerCase()}
function renderPortal(data){state.products=data.products||[];state.customer=data.customer||null;el.lineName.textContent=data.profile?.displayName||'LINE 會員';if(data.profile?.pictureUrl)el.avatar.src=data.profile.pictureUrl;el.profile.hidden=false;if(!state.customer){el.customerSelect.replaceChildren(new Option('請選擇會員',''));(data.customers||[]).forEach(c=>el.customerSelect.append(new Option(c.name,c.name)));el.bindCard.hidden=false;el.customerArea.hidden=true;el.stickySubmit.hidden=true}else{el.bindCard.hidden=true;el.customerArea.hidden=false;el.stickySubmit.hidden=false;el.memberLabel.textContent=`會員：${state.customer.name}`;showProducts();renderOrders(data.orders)}}
function showProducts(){const items=state.products.slice(0,100);el.productResults.replaceChildren(...(items.length?items.map(p=>{const b=document.createElement('button');b.type='button';b.className='option'+(state.selected?.name===p.name?' selected':'');b.innerHTML=`<strong>${esc(p.name)}</strong><small>${money.format(p.price)}／${esc(p.unit||'件')}</small>`;b.onclick=()=>selectProduct(p);return b}):[Object.assign(document.createElement('div'),{className:'empty',textContent:'目前沒有可選商品'})]));el.productResults.hidden=false}
function selectProduct(p){state.selected=p;el.selectedProduct.value=p.name;showProducts();updatePrice()}
function updatePrice(){const q=Math.max(Number(el.quantity.value)||0,0);el.unitPrice.textContent=money.format(state.selected?.price||0);el.totalPrice.textContent=money.format((state.selected?.price||0)*q)}
function changeQuantity(change){el.quantity.value=Math.max(1,(Number(el.quantity.value)||1)+change);updatePrice()}
function renderOrders(result){const grouped=new Map;(result?.orders||[]).forEach(o=>{const x=grouped.get(o.productName)||{name:o.productName,quantity:0,amount:0,latest:o.date};x.quantity+=Number(o.quantity)||0;x.amount+=Number(o.amount)||0;if(o.date>x.latest)x.latest=o.date;grouped.set(o.productName,x)});el.unshippedAmount.textContent=money.format(result?.unshippedAmount||0);const rows=[...grouped.values()];el.orders.replaceChildren(...(rows.length?rows.map(o=>{const a=document.createElement('article');a.className='order';a.innerHTML=`<div class="order-top"><h3>${esc(o.name)}</h3><strong>${money.format(o.amount)}</strong></div><div class="meta">數量 ${o.quantity}｜最近訂購 ${esc(o.latest)}</div>`;return a}):[Object.assign(document.createElement('div'),{className:'empty',textContent:'目前沒有未出貨商品'})]))}
async function load(){el.loadingText.textContent='正在讀取會員與商品資料...';const data=await timeout(call('getCustomerPortal',state.auth),20000,'讀取逾時，請關閉後從 LINE 再開啟');renderPortal(data);el.loading.hidden=true}
async function init(){try{el.loadingText.textContent='正在連接 LINE 登入...';await timeout(liff.init({liffId:LIFF_ID,withLoginOnExternalBrowser:true}),12000,'LINE 登入連線逾時');if(!liff.isLoggedIn()){liff.login({redirectUri:location.origin+location.pathname+location.hash});return}state.auth={idToken:liff.getIDToken()||'',accessToken:liff.getAccessToken()||''};if(!state.auth.idToken&&!state.auth.accessToken)throw new Error('無法取得 LINE 登入資料');await load()}catch(e){el.loading.innerHTML=`<div class="empty">${esc(e.message)}</div>`;toast(e.message,true)}}
el.quantity.oninput=updatePrice;el.quantityMinus.onclick=()=>changeQuantity(-1);el.quantityPlus.onclick=()=>changeQuantity(1);
el.submitButton.onclick=()=>{if(!state.selected)return toast('請先選擇商品',true);const q=Number(el.quantity.value);if(!Number.isInteger(q)||q<1)return toast('請輸入正確數量',true);el.confirmDetail.innerHTML=`<p><span>會員</span><strong>${esc(state.customer.name)}</strong></p><p><span>商品</span><strong>${esc(state.selected.name)}</strong></p><p><span>數量</span><strong>${q}</strong></p><p><span>總額</span><strong>${money.format(state.selected.price*q)}</strong></p>`;el.confirmDialog.showModal()};
el.backButton.onclick=()=>el.confirmDialog.close();
el.confirmButton.onclick=async()=>{busy(el.confirmButton,true,'送出中...');busy(el.submitButton,true,'送出中...');try{const q=Number(el.quantity.value),p=state.selected;const result=await call('addLineOrder',state.auth,{productName:p.name,quantity:q});renderOrders(result.orders);el.confirmDialog.close();el.successBox.hidden=false;el.successBox.innerHTML=`<h3>訂單已完成</h3><p>商品：${esc(p.name)}</p><p>數量：${q}</p><p>金額：${money.format(p.price*q)}</p>`;el.quantity.value=1;state.selected=null;el.selectedProduct.value='';showProducts();updatePrice();el.successBox.scrollIntoView({behavior:'smooth',block:'center'});toast(result.message)}catch(e){toast(e.message,true)}finally{busy(el.confirmButton,false);busy(el.submitButton,false)}};
el.bindButton.onclick=async()=>{if(!el.customerSelect.value)return toast('請選擇會員',true);busy(el.bindButton,true,'綁定中...');try{renderPortal(await call('bindLineCustomer',state.auth,el.customerSelect.value));toast('會員綁定完成')}catch(e){toast(e.message,true)}finally{busy(el.bindButton,false)}};
el.refreshButton.onclick=async()=>{busy(el.refreshButton,true,'更新中...');try{const data=await call('getCustomerPortal',state.auth);renderOrders(data.orders);toast('訂單已更新')}catch(e){toast(e.message,true)}finally{busy(el.refreshButton,false)}};
el.closePageButton.onclick=()=>{try{if(window.liff&&liff.isInClient&&liff.isInClient()){liff.closeWindow();return}}catch(e){}toast('請點右上角 X 關閉頁面')};
init();
</script>
</body>
</html>
